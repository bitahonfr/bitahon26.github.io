<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BITAHON — T-shirt RABBENOU</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap');

    :root {
      --navy: #14213d;
      --cream: #f6f2ea;
      --white: #ffffff;
      --text: #273349;
      --muted: #778196;
      --line: #e5e8ef;
      --green: #16834f;
      --shadow: 0 24px 70px rgba(20, 33, 61, .12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--cream);
      font-family: "DM Sans", Arial, sans-serif;
    }
    img { display: block; max-width: 100%; }
    button { font: inherit; cursor: pointer; }

    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 76px;
      padding: 0 6%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      color: var(--navy);
      text-decoration: none;
      font: 800 1.5rem "Manrope", sans-serif;
      letter-spacing: 4px;
    }

    .brand small {
      display: block;
      margin-top: -4px;
      color: var(--muted);
      font-size: .55rem;
      letter-spacing: 2px;
      text-align: center;
    }

    .page {
      min-height: calc(100vh - 76px);
      padding: 54px 6% 80px;
    }

    .hero {
      max-width: 1180px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 44px;
      align-items: center;
      justify-items: center;
    }

    .product-card {
      overflow: hidden;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .gallery {
      position: relative;
      aspect-ratio: 561 / 701;
      background: #e9edf4;
      overflow: hidden;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform .35s ease;
    }

    .gallery:hover .main-image { transform: scale(1.03); }

    .badge {
      position: absolute;
      top: 18px;
      left: 18px;
      padding: 9px 12px;
      color: var(--navy);
      background: rgba(255, 255, 255, .92);
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
    }

    .zoom {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: 48px;
      height: 48px;
      color: var(--navy);
      background: white;
      border: 0;
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(20, 33, 61, .18);
      font-size: 1.2rem;
    }

    .thumbs {
      position: absolute;
      left: 18px;
      bottom: 18px;
      display: flex;
      gap: 10px;
    }

    .thumb {
      width: 64px;
      height: 72px;
      padding: 0;
      overflow: hidden;
      background: white;
      border: 2px solid white;
      border-radius: 12px;
    }

    .thumb.active { border-color: var(--navy); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .order-box {
      padding: 28px;
    }

    .top-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    .product-name {
      margin: 0 0 6px;
      color: var(--navy);
      font: 800 1.7rem "Manrope", sans-serif;
      letter-spacing: -.5px;
    }

    .product-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.55;
    }

    .price {
      color: var(--navy);
      font-size: 1.8rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .label {
      display: block;
      margin: 22px 0 10px;
      color: var(--navy);
      font-size: .82rem;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .sizes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .size-group {
      padding: 14px;
      background: #f8f9fc;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .size-group + .size-group { margin-top: 10px; }

    .size-group-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
    }

    .size-button {
      min-height: 47px;
      color: var(--navy);
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-weight: 900;
      transition: .18s ease;
    }

    .size-button:hover,
    .size-button.active {
      color: white;
      background: var(--navy);
      border-color: var(--navy);
    }

    .quantity {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
    }

    .quantity button {
      width: 58px;
      height: 100%;
      color: var(--navy);
      background: #f7f8fb;
      border: 0;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .quantity strong {
      color: var(--navy);
      font-size: 1.12rem;
    }

    .total-line {
      margin: 18px 0 20px;
      padding: 15px 0;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      color: var(--navy);
      font-weight: 900;
    }

    .order-button {
      width: 100%;
      min-height: 56px;
      color: white;
      background: var(--green);
      border: 0;
      border-radius: 15px;
      font-size: 1rem;
      font-weight: 900;
      transition: .2s ease;
    }

    .order-button:hover {
      background: #106d40;
      transform: translateY(-2px);
    }

    .note {
      margin: 13px 0 0;
      color: var(--muted);
      font-size: .86rem;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 70px 18px 28px;
      background: rgba(5, 11, 22, .94);
    }

    .modal.open { display: grid; }

    .modal img {
      max-width: 92vw;
      max-height: 84vh;
      object-fit: contain;
      cursor: zoom-in;
      transition: .25s ease;
    }

    .modal img.zoomed {
      transform: scale(1.65);
      cursor: zoom-out;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 22px;
      width: 46px;
      height: 46px;
      color: white;
      background: transparent;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 999px;
      font-size: 1.4rem;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .product-card { max-width: 560px; width: 100%; }
    }

    @media (max-width: 520px) {
      .header { padding: 0 5%; }
      .page { padding: 34px 5% 56px; }
      .top-line { flex-direction: column; gap: 8px; }
      .thumb { width: 54px; height: 62px; }
      .order-box { padding: 22px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="brand" href="#">BITAHON<small>ביטחון</small></a>
  </header>

  <main class="page">
    <section class="hero">
      <article class="product-card" id="commander">
        <div class="gallery">
          <span class="badge">35 €</span>
          <img class="main-image" id="mainImage" src="9829A428-D263-4399-87F2-88FD6B40D4FC.png" alt="T-shirt RABBENOU">
          <div class="thumbs">
            <button class="thumb active" type="button" data-image="9829A428-D263-4399-87F2-88FD6B40D4FC.png" aria-label="Photo 1">
              <img src="9829A428-D263-4399-87F2-88FD6B40D4FC.png" alt="Photo 1 du t-shirt RABBENOU">
            </button>
            <button class="thumb" type="button" data-image="4B9D5102-09EB-41F3-A4B6-4809DDF12FB7.png" aria-label="Photo 2">
              <img src="4B9D5102-09EB-41F3-A4B6-4809DDF12FB7.png" alt="Photo 2 du t-shirt RABBENOU">
            </button>
          </div>
          <button class="zoom" id="zoomButton" type="button" aria-label="Agrandir l'image">⌕</button>
        </div>

        <div class="order-box">
          <div class="top-line">
            <div>
              <h2 class="product-name">T-shirt RABBENOU</h2>
              <p class="product-subtitle">
                100% coton - 190g/m²<br>
                Coupe confortable, impression de qualité.
              </p>
            </div>
            <div class="price">35 €</div>
          </div>

          <span class="label">Quantité</span>
          <div class="quantity">
            <button type="button" id="minus" aria-label="Diminuer la quantité">−</button>
            <strong id="quantity">1</strong>
            <button type="button" id="plus" aria-label="Augmenter la quantité">+</button>
          </div>

          <span class="label">Choisis les tailles</span>
          <div id="sizeGroups"></div>

          <div class="total-line">
            <span>Total</span>
            <span id="total">35 €</span>
          </div>

          <button class="order-button" id="orderButton" type="button">Commander</button>
          <p class="note">Le bouton ouvre une conversation WhatsApp avec le message déjà prêt.</p>
        </div>
      </article>
    </section>
  </main>

  <div class="modal" id="modal">
    <button class="close" id="closeModal" type="button" aria-label="Fermer">×</button>
    <img id="modalImage" alt="Aperçu agrandi du t-shirt RABBENOU">
  </div>

  <script>
    const whatsappNumber = '33651977674';
    const productName = 'T-shirt RABBENOU';
    const unitPrice = 35;

    let quantity = 1;
    let selectedSizes = ['S'];

    const mainImage = document.getElementById('mainImage');
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const quantityText = document.getElementById('quantity');
    const totalText = document.getElementById('total');
    const sizeGroups = document.getElementById('sizeGroups');

    function placeholder(view) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="900" height="930">
        <rect width="100%" height="100%" fill="#e9edf4"/>
        <circle cx="450" cy="430" r="285" fill="#d7dfeb"/>
        <path d="M285 230 165 345l86 105 64-58v330h270V392l64 58 86-105-120-115-92-30c-20 42-47 62-73 62s-53-20-73-62l-92 30z" fill="#14213d"/>
        <text x="450" y="470" fill="white" text-anchor="middle" font-family="Arial" font-weight="700" font-size="58">BITAHON</text>
        <text x="450" y="535" fill="#cbd8ea" text-anchor="middle" font-family="Arial" font-size="34">ביטחון</text>
        <text x="450" y="830" fill="#778196" text-anchor="middle" font-family="Arial" font-size="24">PHOTO ${view} À REMPLACER</text>
      </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    document.querySelectorAll('.thumb img').forEach((image, index) => {
      image.addEventListener('error', () => image.src = placeholder(index + 1), { once: true });
    });

    mainImage.addEventListener('error', () => {
      mainImage.src = placeholder(1);
    }, { once: true });

    document.querySelectorAll('.thumb').forEach((button, index) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.thumb').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        mainImage.src = button.querySelector('img').src || button.dataset.image;
        mainImage.alt = `${productName} photo ${index + 1}`;
      });
    });

    function renderSizeGroups() {
      sizeGroups.innerHTML = selectedSizes.map((size, index) => `
        <div class="size-group">
          <p class="size-group-title">T-shirt ${index + 1}</p>
          <div class="sizes">
            ${['S', 'M', 'L', 'XL'].map(option => `
              <button class="size-button ${size === option ? 'active' : ''}" type="button" data-index="${index}" data-size="${option}">${option}</button>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function updateTotal() {
      quantityText.textContent = quantity;
      totalText.textContent = `${quantity * unitPrice} €`;
      selectedSizes = selectedSizes.slice(0, quantity);
      while (selectedSizes.length < quantity) selectedSizes.push('S');
      renderSizeGroups();
    }

    document.getElementById('minus').addEventListener('click', () => {
      quantity = Math.max(1, quantity - 1);
      updateTotal();
    });

    document.getElementById('plus').addEventListener('click', () => {
      quantity += 1;
      updateTotal();
    });

    sizeGroups.addEventListener('click', event => {
      const button = event.target.closest('.size-button');
      if (!button) return;
      const index = Number(button.dataset.index);
      selectedSizes[index] = button.dataset.size;
      renderSizeGroups();
    });

    document.getElementById('orderButton').addEventListener('click', () => {
      const total = quantity * unitPrice;
      const sizesText = selectedSizes.map((size, index) => `t-shirt ${index + 1} taille ${size}`).join(', ');
      const message = `Bonjour, je souhaite commander le ${productName}, quantité ${quantity} (${sizesText}), au prix total de ${total} €.`;
      window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, '_blank');
    });

    renderSizeGroups();

    document.getElementById('zoomButton').addEventListener('click', () => {
      modalImage.src = mainImage.src;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    function closeModal() {
      modal.classList.remove('open');
      modalImage.classList.remove('zoomed');
      document.body.style.overflow = '';
    }

    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', event => {
      if (event.target === modal) closeModal();
    });
    modalImage.addEventListener('click', () => modalImage.classList.toggle('zoomed'));
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
